name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Configure local.properties
        run: |
          FLUTTER_BIN=$(which flutter)
          FLUTTER_PATH=$(readlink -f "$FLUTTER_BIN" | xargs dirname | xargs dirname)
          echo "Flutter SDK path: $FLUTTER_PATH"
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_PATH" >> android/local.properties
          VERSION_JSON="$FLUTTER_PATH/bin/cache/flutter.version.json"
          ENGINE_VERSION=$(python3 -c "import json; print(json.load(open('$VERSION_JSON'))['engineRevision'])" 2>/dev/null || echo "")
          echo "Engine version (full hash): $ENGINE_VERSION"
          if [ -z "$ENGINE_VERSION" ]; then
            echo "ERROR: Could not determine engine version!"
            exit 1
          fi
          echo "flutter.engineVersion=$ENGINE_VERSION" >> android/local.properties
          cat android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          for f in app-*-release.apk; do
            abi=$(echo "$f" | sed 's/app-\(.*\)-release.apk/\1/')
            cp "$f" "CiliCili-${{ github.ref_name }}-${abi}.apk"
          done
          ls -la *.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CiliCili-${{ github.ref_name }}-APKs
          path: build/app/outputs/flutter-apk/CiliCili-${{ github.ref_name }}-*.apk
          retention-days: 90

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: CiliCili ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            # CiliCili ${{ github.ref_name }}

            ## 🆕 v3.0.0 重大更新 - 对齐 PiliPlus 架构

            ### 🎬 真实视频播放器
            - 集成 media_kit (libmpv)，**App 内直接播放 B 站视频**
            - DASH 视频流+音频流分离播放（对齐 PiliPlus 方案）
            - 自适应 B 站 Referer/UA
            - 替代了 v2.x 的"跳浏览器"占位方案

            ### 🎨 弹幕引擎
            - 集成 canvas_danmaku，对齐 PiliPlus 弹幕渲染
            - 支持滚动/顶部/底部三种弹幕模式
            - 会员彩色弹幕
            - 弹幕大小/不透明度/显示区域/速度可调

            ### 🌐 网络层重写
            - 从 http 包迁移到 **Dio**（对齐 PiliPlus）
            - **WBI 签名**（w_rid + wts）实现，解锁更高画质接口
            - 多 appKey/appSec 策略（Android HD + TV secret）
            - 多 UA 自适应（移动端 + HD 端）
            - 按 Day 缓存 mixinKey

            ### 👥 多账号管理
            - 新增多账号体系（对齐 PiliPlus AccountManager）
            - 多账号切换/添加/删除
            - 每个账号独立 cookie/buvid

            ### 📺 新增直播模块
            - 直播间列表（首页热门直播）
            - 在线人数、分区、LIVE 状态显示
            - 直播流地址获取（后续接入播放器）

            ### 🎬 新增番剧/影视模块
            - 番剧/国创/纪录片/电影/电视剧 5 个 Tab
            - 番剧封面、评分、地区、风格展示

            ### 🖥️ 多平台 scaffold
            - 新增 `setup_platforms.sh` 脚本
            - 用户本地运行即可生成 Windows/macOS/Linux/iOS 工程目录
            - `./setup_platforms.sh`

            ### 📦 依赖升级
            - 新增：media_kit, canvas_danmaku, dio, crypto, window_manager, tray_manager 等
            - 升级：cached_network_image, webview_flutter, shared_preferences 等

            ## 下载安装
            | 架构 | 适用设备 | 文件 |
            |------|---------|------|
            | arm64-v8a | 大多数现代手机/TV | `CiliCili-${{ github.ref_name }}-arm64-v8a.apk` |
            | armeabi-v7a | 老旧设备 | `CiliCili-${{ github.ref_name }}-armeabi-v7a.apk` |
            | x86_64 | 模拟器/x86设备 | `CiliCili-${{ github.ref_name }}-x86_64.apk` |

            > 电视端推荐下载 `arm64-v8a` 版本
            >
            > 桌面端（Win/Mac/Linux）需 clone 仓库后运行 `./setup_platforms.sh` 生成平台目录，再 `flutter build <platform>`
          files: |
            build/app/outputs/flutter-apk/CiliCili-${{ github.ref_name }}-arm64-v8a.apk
            build/app/outputs/flutter-apk/CiliCili-${{ github.ref_name }}-armeabi-v7a.apk
            build/app/outputs/flutter-apk/CiliCili-${{ github.ref_name }}-x86_64.apk
          draft: false
          prerelease: false
          make_latest: true
