name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Configure local.properties
        run: |
          FLUTTER_PATH=$(which flutter | xargs readlink -f | xargs dirname | xargs dirname)
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_PATH" >> android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Build app bundle
        run: flutter build appbundle --release

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-armeabi-v7a-release.apk CiliCili-v${{ github.ref_name }}-armeabi-v7a.apk
          mv app-arm64-v8a-release.apk CiliCili-v${{ github.ref_name }}-arm64-v8a.apk
          mv app-x86_64-release.apk CiliCili-v${{ github.ref_name }}-x86_64.apk
          cd ../../bundle/release
          mv app-release.aab CiliCili-v${{ github.ref_name }}.aab

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: CiliCili v${{ github.ref_name }}
          body: |
            # CiliCili v${{ github.ref_name }}

            ## 更新内容
            - 🔐 二维码扫码登录
            - 📺 我的页面：用户信息、历史记录、收藏夹、动态
            - 💬 视频评论列表
            - 👍 点赞/投币/收藏/关注
            - 🏠 首页推荐、热门、排行榜
            - 📂 视频分区浏览
            - 🔍 搜索功能 + 热搜词
            - 🎨 双风格主题（Material 3 + iOS）
            - 😆 搞怪错误提示

            ## 下载
            | 架构 | 文件 |
            |------|------|
            | armeabi-v7a | `CiliCili-v${{ github.ref_name }}-armeabi-v7a.apk` |
            | arm64-v8a | `CiliCili-v${{ github.ref_name }}-arm64-v8a.apk` |
            | x86_64 | `CiliCili-v${{ github.ref_name }}-x86_64.apk` |
            | App Bundle | `CiliCili-v${{ github.ref_name }}.aab` |
          files: |
            build/app/outputs/flutter-apk/CiliCili-v${{ github.ref_name }}-armeabi-v7a.apk
            build/app/outputs/flutter-apk/CiliCili-v${{ github.ref_name }}-arm64-v8a.apk
            build/app/outputs/flutter-apk/CiliCili-v${{ github.ref_name }}-x86_64.apk
            build/app/outputs/bundle/release/CiliCili-v${{ github.ref_name }}.aab
          draft: false
          prerelease: false
