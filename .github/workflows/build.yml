name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Configure local.properties
        run: |
          # 获取 Flutter SDK 真实路径（解析符号链接）
          FLUTTER_BIN=$(which flutter)
          FLUTTER_PATH=$(readlink -f "$FLUTTER_BIN" | xargs dirname | xargs dirname)
          echo "Flutter SDK path: $FLUTTER_PATH"
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_PATH" >> android/local.properties
          # 从 flutter.version.json 中读取完整 engine hash
          VERSION_JSON="$FLUTTER_PATH/bin/cache/flutter.version.json"
          ENGINE_VERSION=$(python3 -c "import json; print(json.load(open('$VERSION_JSON'))['engineRevision'])" 2>/dev/null || echo "")
          echo "Engine version (full hash): $ENGINE_VERSION"
          if [ -z "$ENGINE_VERSION" ]; then
            echo "ERROR: Could not determine engine version!"
            exit 1
          fi
          echo "flutter.engineVersion=$ENGINE_VERSION" >> android/local.properties
          cat android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          # tag 形如 v2.1.0，直接用作文件名前缀（避免 CiliCili-vv2.1.0 双 v）
          for f in app-*-release.apk; do
            abi=$(echo "$f" | sed 's/app-\(.*\)-release.apk/\1/')
            cp "$f" "CiliCili-${{ github.ref_name }}-${abi}.apk"
          done
          ls -la *.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CiliCili-${{ github.ref_name }}-APKs
          path: build/app/outputs/flutter-apk/CiliCili-${{ github.ref_name }}-*.apk
          retention-days: 90

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: CiliCili ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            # CiliCili ${{ github.ref_name }}

            ## 🆕 v2.1.1 更新内容
            - 🔑 **修复 APK 签名问题**：release 包现已用正式 keystore 签名，可正常安装（v2.1.0 因未签名导致电视端"解析包时出现问题"）
            - 🎨 **全新应用图标**：B 站粉主题色 + 复古小电视+播放按钮设计
            - 🌐 网页登录（WebView）：通过 B 站官方网页登录，自动提取 Cookie 凭据
            - ⏭️ 恰饭片段识别：基于弹幕关键词密度分析，自动检测视频中的恰饭/广告片段
              - 时间轴可视化、片段列表、自动跳过开关
            - 📺 v2.0.0 基础功能：扫码登录、首页推荐、热门、排行榜、分区、搜索、评论、点赞/投币/收藏/关注

            ## 下载安装
            | 架构 | 适用设备 | 文件 |
            |------|---------|------|
            | arm64-v8a | 大多数现代手机/TV | `CiliCili-${{ github.ref_name }}-arm64-v8a.apk` |
            | armeabi-v7a | 老旧设备 | `CiliCili-${{ github.ref_name }}-armeabi-v7a.apk` |
            | x86_64 | 模拟器/x86设备 | `CiliCili-${{ github.ref_name }}-x86_64.apk` |

            > 电视端推荐下载 `arm64-v8a` 版本
          files: |
            build/app/outputs/flutter-apk/CiliCili-${{ github.ref_name }}-arm64-v8a.apk
            build/app/outputs/flutter-apk/CiliCili-${{ github.ref_name }}-armeabi-v7a.apk
            build/app/outputs/flutter-apk/CiliCili-${{ github.ref_name }}-x86_64.apk
          draft: false
          prerelease: false
          make_latest: true
