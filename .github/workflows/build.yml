name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Configure local.properties
        run: |
          FLUTTER_PATH=$(dirname $(dirname $(which flutter)))
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_PATH" >> android/local.properties
          cat android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          for f in app-*-release.apk; do
            abi=$(echo "$f" | sed 's/app-\(.*\)-release.apk/\1/')
            cp "$f" "CiliCili-v${{ github.ref_name }}-${abi}.apk"
          done
          ls -la *.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CiliCili-v${{ github.ref_name }}-APKs
          path: build/app/outputs/flutter-apk/CiliCili-v${{ github.ref_name }}-*.apk
          retention-days: 90

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: CiliCili v${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            # CiliCili v${{ github.ref_name }}

            ## 更新内容
            - 🔐 二维码扫码登录
            - 📺 我的页面：用户信息、历史记录、收藏夹、动态
            - 💬 视频评论列表
            - 👍 点赞/投币/收藏/关注
            - 🏠 首页推荐、热门、排行榜
            - 📂 视频分区浏览
            - 🔍 搜索功能 + 热搜词
            - 🎨 双风格主题（Material 3 + iOS）
            - 😆 搞怪错误提示

            ## 下载安装
            | 架构 | 适用设备 | 文件 |
            |------|---------|------|
            | arm64-v8a | 大多数现代手机/TV | `CiliCili-v${{ github.ref_name }}-arm64-v8a.apk` |
            | armeabi-v7a | 老旧设备 | `CiliCili-v${{ github.ref_name }}-armeabi-v7a.apk` |
            | x86_64 | 模拟器/x86设备 | `CiliCili-v${{ github.ref_name }}-x86_64.apk` |

            > 电视端推荐下载 `arm64-v8a` 版本
          files: |
            build/app/outputs/flutter-apk/CiliCili-v${{ github.ref_name }}-arm64-v8a.apk
            build/app/outputs/flutter-apk/CiliCili-v${{ github.ref_name }}-armeabi-v7a.apk
            build/app/outputs/flutter-apk/CiliCili-v${{ github.ref_name }}-x86_64.apk
          draft: false
          prerelease: false
          make_latest: true
